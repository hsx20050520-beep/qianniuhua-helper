name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置 JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: 恢复签名文件
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > qnh-keystore.jks
            echo "keystore restored"
          else
            echo "Warning: KEYSTORE_BASE64 not set, build may fail"
          fi

      - name: 配置 Android SDK
        run: |
          set -e
          SDKMAN="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ -x "$SDKMAN" ]; then
            yes | "$SDKMAN" --licenses >/dev/null 2>&1 || true
            "$SDKMAN" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: 安装 Gradle 8.5
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.5"
          cache-disabled: true

      - name: 构建 Debug APK
        run: |
          set -o pipefail
          gradle --version | head -15
          gradle :app:assembleDebug --no-daemon --stacktrace --info

      - name: 重命名 APK
        run: |
          set -e
          SRC="app/build/outputs/apk/debug/app-debug.apk"
          [ -f "$SRC" ] || { echo "未找到 $SRC"; exit 1; }
          VER=$(grep -oE 'versionName\s*=\s*"[0-9.]+[0-9]"' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          [ -z "$VER" ] && VER="1.0.0"
          DST="app/build/outputs/apk/debug/qnh-helper-v${VER}-debug.apk"
          cp "$SRC" "$DST"
          ls -lh "$DST"
          sha256sum "$DST"
          echo "VER=$VER" >> $GITHUB_ENV

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: qnh-helper-v${{ env.VER }}-debug-apk
          path: app/build/outputs/apk/debug/qnh-helper-v${{ env.VER }}-debug.apk
